name: android-apk

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend and sync Android
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://192.168.11.40:8081/api/v1
        run: npm run mobile:sync

      - name: Remove local AAPT2 override
        working-directory: frontend
        run: sed -i '/^android\.aapt2FromMavenOverride=/d' android/gradle.properties

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pecenje-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
