name: android-release

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "frontend/**"
      - ".github/workflows/android-release.yml"

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/android"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android/release.keystore"

      - name: Build frontend and sync Android
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run mobile:sync

      - name: Remove local AAPT2 override
        working-directory: frontend
        run: sed -i '/^android\.aapt2FromMavenOverride=/d' android/gradle.properties

      - name: Build signed release APK
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Resolve release APK path
        id: resolve_apk
        run: |
          set -eu
          RELEASE_DIR="frontend/android/app/build/outputs/apk/release"
          if [ -f "$RELEASE_DIR/app-release.apk" ]; then
            APK_PATH="$RELEASE_DIR/app-release.apk"
          elif [ -f "$RELEASE_DIR/app-release-unsigned.apk" ]; then
            APK_PATH="$RELEASE_DIR/app-release-unsigned.apk"
          else
            echo "No release APK found in $RELEASE_DIR"
            ls -la "$RELEASE_DIR" || true
            exit 1
          fi
          cp "$APK_PATH" "$RELEASE_DIR/pecenje-release.apk"
          echo "apk_path=$RELEASE_DIR/pecenje-release.apk" >> "$GITHUB_OUTPUT"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pecenje-release-apk
          path: ${{ steps.resolve_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Publish APK to stable GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-release
          name: Latest Release APK
          prerelease: true
          make_latest: false
          files: ${{ steps.resolve_apk.outputs.apk_path }}
          overwrite_files: true
